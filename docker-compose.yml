version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - chatbot-network

  app:
    build: .
    container_name: chatbot-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./temp_audio:/app/temp_audio
      - ./logs:/app/logs
    networks:
      - chatbot-network

volumes:
  redis-data:

networks:
  chatbot-network:
    driver: bridge
